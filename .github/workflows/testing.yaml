name: Tests
on:
  workflow_dispatch:

# pull_request:
#   branches: [main]
#   paths:
#     - 'src/**'
#     - 'package.json'

jobs:
  tests-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      # 仅提供 Node >= 22.5 运行时给 vitest worker 使用（测试依赖 node:sqlite 内置模块，
      # ubuntu-latest 默认的 Node 20 不含该模块）。依赖安装仍走 bun install，未改回 npm ci。
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Install dependencies
        run: bun install
      - name: Run unit tests
        run: bun run test:unit

  test-e2e:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Electron binary
        run: bun node_modules/electron/install.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Playwright Browsers
        run: bunx playwright install --with-deps chromium

      - name: Create Executable
        run: bun run package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Playwright tests
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" bun run test:e2e

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
